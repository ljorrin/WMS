###############################################################################
# WMS Panama — Docker Compose PRODUCCIÓN
# Uso: docker compose -f docker-compose.prod.yml up -d
###############################################################################

version: "3.9"

x-common: &common
  restart: unless-stopped
  networks:
    - wms_prod

services:

  # ── Nginx (Reverse Proxy + SSL) ───────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    <<: *common
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./wms-frontend/dist:/usr/share/nginx/html:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── FastAPI Backend ───────────────────────────────────────────────────────
  api:
    build:
      context: ./wms-backend
      dockerfile: Dockerfile
      target: production
    <<: *common
    env_file: ./wms-backend/.env.prod
    environment:
      ENVIRONMENT: production
      WORKERS: "4"
    # Aplica migraciones (alembic upgrade head) antes de arrancar el servidor.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --log-level info"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  # ── Celery Worker ─────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./wms-backend
      dockerfile: Dockerfile
      target: production
    <<: *common
    command: celery -A app.celery_app worker --loglevel=info --concurrency=4
    env_file: ./wms-backend/.env.prod
    environment:
      ENVIRONMENT: production
    depends_on:
      - postgres
      - redis
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  # ── Celery Beat (Scheduler) ───────────────────────────────────────────────
  celery-beat:
    build:
      context: ./wms-backend
      dockerfile: Dockerfile
      target: production
    <<: *common
    command: celery -A app.celery_app beat --loglevel=info
    env_file: ./wms-backend/.env.prod
    environment:
      ENVIRONMENT: production
    depends_on:
      - postgres
      - redis

  # ── PostgreSQL 16 ─────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    <<: *common
    env_file: ./wms-backend/.env.prod
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-wmsdb}
      POSTGRES_USER:     ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wms} -d ${POSTGRES_DB:-wmsdb}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4G

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    <<: *common
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Meilisearch ───────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.6
    <<: *common
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    <<: *common
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.1
    <<: *common
    environment:
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP:     "false"
      GF_SERVER_ROOT_URL:         "https://${DOMAIN}/grafana"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # ── pgBackup (Backup automático) ──────────────────────────────────────────
  pgbackup:
    image: prodrigestivill/postgres-backup-local:16
    <<: *common
    environment:
      POSTGRES_HOST:     postgres
      POSTGRES_DB:       ${POSTGRES_DB:-wmsdb}
      POSTGRES_USER:     ${POSTGRES_USER:-wms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE:          "@daily"
      BACKUP_KEEP_DAYS:  7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
    volumes:
      - ./backups:/backups
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  prometheus_data:
  grafana_data:
  nginx_logs:

networks:
  wms_prod:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
