###############################################################################
# WMS Panama — CI/CD Pipeline (GitHub Actions)
# Runs on: push to main/develop, pull requests
#
# Jobs:
#   test      → Unit tests + integration tests
#   lint      → Ruff, mypy, prettier
#   build     → Docker images (backend + frontend)
#   security  → Bandit, pip-audit, trivy
#   deploy    → Deploy a staging (develop) o producción (main)
###############################################################################

name: WMS Panama CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_BACKEND: ghcr.io/${{ github.repository_owner }}/wms-backend
  IMAGE_FRONTEND: ghcr.io/${{ github.repository_owner }}/wms-frontend
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Unit Tests (rápido, sin servicios externos)
  # ════════════════════════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --break-system-packages

      - name: Run unit tests
        env:
          SECRET_KEY: "ci-secret-key-for-testing-only-must-be-32chars"
          DATABASE_URL: "postgresql+asyncpg://wms:wms@localhost:5432/wmsdb"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: |
          python -m pytest tests/unit/ --noconftest \
            -v --tb=short \
            --junitxml=reports/unit-tests.xml \
            --cov=app --cov-report=xml:reports/coverage.xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: reports/coverage.xml
          flags: unit

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: wms-backend/reports/

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Integration Tests (con PostgreSQL + Redis)
  # ════════════════════════════════════════════════════════════════════════════
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms-backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wms
          POSTGRES_PASSWORD: wmspass
          POSTGRES_DB: wmsdb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite --break-system-packages

      - name: Run migrations
        env:
          DATABASE_SYNC_URL: "postgresql+psycopg2://wms:wmspass@localhost:5432/wmsdb_test"
        run: alembic upgrade head

      - name: Run integration tests
        env:
          SECRET_KEY: "ci-secret-key-for-testing-only-must-be-32chars"
          DATABASE_URL: "postgresql+asyncpg://wms:wmspass@localhost:5432/wmsdb_test"
          REDIS_URL: "redis://localhost:6379/0"
          ENVIRONMENT: "test"
        run: |
          python -m pytest tests/integration/ \
            -v --tb=short \
            --junitxml=reports/integration-tests.xml \
            -x

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: wms-backend/reports/

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Lint & Type Check
  # ════════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy types-python-dateutil

      - name: Ruff lint
        working-directory: wms-backend
        run: ruff check app/ --output-format=github

      - name: Ruff format check
        working-directory: wms-backend
        run: ruff format app/ --check

      - name: Setup Node for frontend lint
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: wms-frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: wms-frontend
        run: npm ci

      - name: TypeScript type check
        working-directory: wms-frontend
        run: npm run type-check

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4: Security Scanning
  # ════════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: pip install bandit pip-audit safety

      - name: Bandit SAST scan
        working-directory: wms-backend
        run: |
          bandit -r app/ -ll -f json -o reports/bandit.json || true
          bandit -r app/ -ll

      - name: pip-audit dependency scan
        working-directory: wms-backend
        run: pip-audit -r requirements.txt --format=json > reports/pip-audit.json || true

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./wms-backend
          severity: CRITICAL,HIGH
          exit-code: 0
          format: sarif
          output: reports/trivy.sarif

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: wms-backend/reports/

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5: Build Docker Images
  # ════════════════════════════════════════════════════════════════════════════
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [unit-tests, lint]
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./wms-backend
          target: production
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}

      - name: Build Frontend
        working-directory: wms-frontend
        run: |
          npm ci
          npm run build

      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & Push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./wms-frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 6: Deploy a Staging (develop) o Producción (main)
  # ════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: [build, integration-tests]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/wms
            git pull origin develop
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --no-deps api celery-worker
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker compose -f docker-compose.prod.yml exec -T api python seeds/run_all.py || true
            echo "✅ Staging deployed: $(date)"

      - name: Smoke test staging
        run: |
          sleep 15
          curl -f https://staging.wms.tuempresa.pa/api/v1/health/live || exit 1
          echo "✅ Smoke test passed"

  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, integration-tests, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/wms
            git pull origin main

            # Backup antes de migrar
            docker compose -f docker-compose.prod.yml exec -T pgbackup /backup.sh || true

            # Rolling update
            docker compose -f docker-compose.prod.yml pull api celery-worker
            docker compose -f docker-compose.prod.yml up -d --no-deps --scale api=2 api
            sleep 30
            docker compose -f docker-compose.prod.yml exec -T api alembic upgrade head
            docker compose -f docker-compose.prod.yml up -d --no-deps celery-worker celery-beat
            echo "✅ Production deployed: $(date)"

      - name: Post-deploy smoke test
        run: |
          sleep 30
          curl -f https://wms.tuempresa.pa/api/v1/health/live || exit 1
          curl -f https://wms.tuempresa.pa/api/v1/health/ready || exit 1
          echo "✅ Production smoke test passed"

      - name: Notify deployment
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "🚀 WMS Panama deployed to PRODUCTION",
              "attachments": [{
                "color": "${{ job.status == 'success' && 'good' || 'danger' }}",
                "fields": [
                  {"title": "Status", "value": "${{ job.status }}", "short": true},
                  {"title": "Commit", "value": "${{ github.sha }}", "short": true},
                  {"title": "Author", "value": "${{ github.actor }}", "short": true}
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
